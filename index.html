<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordnan's task </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="result-container">
    <div class="result-wrapper">

      <div class="result-card">
        <h3 style="margin-bottom: 30px; font-weight: 500;">Your Result</h3>
        
        <div class="score-circle">
          76
          <span>of 100</span>
        </div>

        <h2>Great</h2>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>

      <div class="summary">
        <h3>Summary</h3>
        
        <div class="score-item reaction">
          <span><span class="icon">⚡</span> Reaction</span>
          <span><strong>80</strong> / 100</span>
        </div>

        <div class="score-item memory">
          <span><span class="icon">🧠</span> Memory</span>
          <span><strong>92</strong> / 100</span>
        </div>

        <div class="score-item verbal">
          <span><span class="icon">💬</span> Verbal</span>
          <span><strong>61</strong> / 100</span>
        </div>

        <div class="score-item visual">
          <span><span class="icon">👁️</span> Visual</span>
          <span><strong>73</strong> / 100</span>
        </div>

        <button class="continue-button">Continue</button>
      </div>

    </div>
  </div>

</body>
</html>
